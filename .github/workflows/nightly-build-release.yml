name: Full Platform Nightly Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write # 需要写权限来创建/更新 Release
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }} Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux ---
          - platform: linux
            os: ubuntu-latest
            command: flutter build linux --release
            artifact_path: build/linux/x64/release/bundle
            output_name: 2048-nightly-linux-x64.zip

          # --- Android ---
          - platform: android
            os: ubuntu-latest
            command: flutter build apk --release --split-per-abi
            artifact_path: build/app/outputs/flutter-apk
            output_name: this-do-nothing

          # --- Web ---
          - platform: web
            os: ubuntu-latest
            command: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
            artifact_path: build/web
            output_name: 2048-nightly-web.zip

          # --- iOS ---
          - platform: ios
            os: macos-latest
            command: flutter build ios --release --no-codesign
            artifact_path: build/ios/iphoneos/Runner.app
            output_name: 2048-nightly-ios-nosign.zip

          # --- macOS ---
          - platform: macos
            os: macos-latest
            command: flutter build macos --release
            artifact_path: build/macos/Build/Products/Release
            output_name: 2048-nightly-macos-universal.zip

          # --- Windows ---
          - platform: windows
            os: windows-latest
            command: flutter build windows --release
            artifact_path: build/windows/x64/runner/Release
            output_name: 2048-nightly-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      # 1. Linux 依赖
      - name: Install Linux System Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev libjsoncpp-dev libsecret-1-0 zip

      # 1. Android Java 环境
      - name: Setup Java for Android
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:filehash:pubspec.lock'

      # 3. 获取 Dart/Flutter 依赖
      - name: Flutter Pub Get
        run: flutter pub get --no-example --enforce-lockfile

      # 4. 构建
      - name: Run Build Command
        run: ${{ matrix.command }}

      # 创建统一的暂存目录，防止把工作区其他无关文件打进去
      - name: Create Staging Directory
        run: mkdir -p release-staging

      # 针对 Linux, Web, macOS, iOS (Bash 环境) 的打包逻辑
      - name: Package (Unix)
        if: runner.os != 'Windows' && matrix.platform != 'android'
        run: |
          cd "$(dirname "${{ matrix.artifact_path }}")"
          BASENAME="$(basename "${{ matrix.artifact_path }}")"
          zip -r "${{ github.workspace }}/release-staging/${{ matrix.output_name }}" "$BASENAME"

      # 针对 Android
      - name: Package (Android)
        if: matrix.platform == 'android'
        run: |
          # 进入 apk 输出目录
          cd "${{ matrix.artifact_path }}"
          
          # 直接把已知的 3 个文件分别重命名并移动到暂存区
          # (加上 || true 是防止未来 Flutter 如果少打某一个包时不报错中断)
          mv app-armeabi-v7a-release.apk "${{ github.workspace }}/release-staging/2048-nightly-android-armeabi-v7a.apk" || true
          mv app-arm64-v8a-release.apk "${{ github.workspace }}/release-staging/2048-nightly-android-arm64-v8a.apk" || true
          mv app-x86_64-release.apk "${{ github.workspace }}/release-staging/2048-nightly-android-x86_64.apk" || true

      # 针对 Windows (PowerShell 环境) 的打包逻辑
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "${{ matrix.artifact_path }}\*" -DestinationPath "${{ github.workspace }}\release-staging\${{ matrix.output_name }}"

      # --- 关键修改 1：不直接发布，而是作为 Workflow 构件上传 ---
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}
          path: release-staging/*
          retention-days: 1

      # 上传 GitHub Pages 产物 (Web 平台特供)
      - name: Upload GitHub Pages Artifact
        if: matrix.platform == 'web'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ matrix.artifact_path }}

  # --- 关键修改 2：新增统一发布的 Job ---
  publish-release:
    name: Publish Nightly Release
    # 核心：必须等待 build 里的所有平台任务（6个并发）全部成功，才会执行
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 下载 build 步骤中上传的所有平台的压缩包 / APK
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          # 下载所有以 artifact- 开头的构件
          pattern: artifact-*
          # 把它们解压到同一个文件夹下
          path: release-assets
          # 开启合并模式，否则 v4 会给每个平台建一个单独的子文件夹
          merge-multiple: true

      # 强制删除旧的 nightly Release 和 Tag（解决时间戳不更新的问题）
      - name: Delete old Nightly release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --cleanup-tag -y || true

      # 重新创建全新的 Nightly Release，并把所有下载回来的产物附加上去
      - name: Create Nightly Release
        uses: ncipollo/release-action@v1
        with:
          # 上传 release-assets 目录下的所有文件
          artifacts: "release-assets/*"
          tag: "nightly"
          name: "Nightly Build"
          body: "Latest automated build from the main branch."
          makeLatest: true
          # 绑定当前提交的代码 SHA，防止 tag 丢失指向
          commit: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # 部署 Web 页面
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4