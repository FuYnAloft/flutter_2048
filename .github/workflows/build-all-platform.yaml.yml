name: Full Platform Build

on:
  workflow_dispatch:

# 配置权限
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # 限制部署并发
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.platform }} Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Linux / Android / Web (Ubuntu Runner) ---
          - platform: android
            os: ubuntu-latest
            command: flutter build apk --release
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
          - platform: linux
            os: ubuntu-latest
            command: flutter build linux --release
            artifact_path: build/linux/x64/release/bundle/
          # Web 需要指定 base-href 来正确处理 GitHub Pages 的路径问题
          - platform: web
            os: ubuntu-latest
            command: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
            artifact_path: build/web/

          # --- iOS / macOS (macOS Runner) ---
          - platform: ios
            os: macos-latest
            command: flutter build ios --release --no-codesign
            artifact_path: build/ios/iphoneos/Runner.app
          - platform: macos
            os: macos-latest
            command: flutter build macos --release
            artifact_path: build/macos/Build/Products/Release/

          # --- Windows (Windows Runner) ---
          - platform: windows
            os: windows-latest
            command: flutter build windows --release
            artifact_path: build/windows/x64/runner/Release/

    steps:
      - uses: actions/checkout@v4

      # 1. Linux 系统依赖安装（仅 Linux 平台需要）
      - name: Install Linux System Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            libsecret-1-0

      # 1. Android SDK 安装（仅 Android 平台需要）
      - name: Setup Java for Android
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. 安装 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          # 自动根据 pubspec.lock 缓存依赖，大幅提升速度
          cache-key: 'flutter-:os:-:channel:-:filehash:pubspec.lock'

      # 3. 获取 Dart/Flutter 依赖
      - name: Flutter Pub Get
        run: flutter pub get

      # 4. 执行 Release 构建
      - name: Run Build Command
        run: ${{ matrix.command }}

      # 5. 上传构建产物
      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }} release
          path: ${{ matrix.artifact_path }}
          retention-days: 7

      # 5. 上传 GitHub Pages 产物（仅 Web 平台执行  ）
      - name: Upload GitHub Pages Artifact
        if: matrix.platform == 'web'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ matrix.artifact_path }}

  # 部署 Web 页面
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build # 依赖 build 任务完成
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4